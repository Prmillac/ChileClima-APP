<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChileClima | Detalle</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="weather-app">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Volver al Inicio</a>
        </div>
    </nav>

    <main class="container text-center">
        <div id="detalle-ciudad" class="row justify-content-center">
            </div>
    </main>

    <script src="js/datos.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const ciudad = ciudadesChile.find(c => c.id === id);
        const visor = document.getElementById('detalle-ciudad');

        if (ciudad) {
            visor.innerHTML = `
                <div class="col-md-8">
                    <div class="card shadow p-5 border-0" style="border-radius: 20px;">
                        <h1 class="display-3 fw-bold text-primary">${ciudad.nombre}</h1>
                        <p class="h4 text-muted">${ciudad.region}</p>
                        <hr>
                        <div class="display-1 my-4">${ciudad.temp}°C</div>
                        <h3><span class="badge badge-primary px-4 py-2">${ciudad.estado}</span></h3>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
