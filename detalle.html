<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChileClima | Detalle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0039a6 !important; }
        .card-detalle { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .pronostico-card { background: white; border-radius: 12px; padding: 15px; text-align: center; border: 1px solid #eee; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">← Volver al Inicio</a>
        </div>
    </nav>

    <main class="container">
        <div id="pantalla-detalle" class="row justify-content-center">
            </div>
    </main>

    <script>
        // Datos replicados para consistencia
        const ciudades = [
            { id: 1, nombre: "Arica", region: "Arica y Parinacota", temp: 22, estado: "Despejado", hum: "60%", viento: "12 km/h" },
            { id: 2, nombre: "Iquique", region: "Tarapacá", temp: 20, estado: "Nublado", hum: "65%", viento: "10 km/h" },
            { id: 3, nombre: "Antofagasta", region: "Antofagasta", temp: 19, estado: "Despejado", hum: "70%", viento: "15 km/h" },
            { id: 4, nombre: "Copiapó", region: "Atacama", temp: 25, estado: "Despejado", hum: "30%", viento: "5 km/h" },
            { id: 5, nombre: "La Serena", region: "Coquimbo", temp: 18, estado: "Neblina", hum: "80%", viento: "14 km/h" },
            { id: 6, nombre: "Valparaíso", region: "Valparaíso", temp: 17, estado: "Parcial", hum: "75%", viento: "20 km/h" },
            { id: 7, nombre: "Santiago", region: "Metropolitana", temp: 28, estado: "Despejado", hum: "25%", viento: "8 km/h" },
            { id: 8, nombre: "Rancagua", region: "O'Higgins", temp: 26, estado: "Despejado", hum: "35%", viento: "10 km/h" },
            { id: 9, nombre: "Talca", region: "Maule", temp: 24, estado: "Nublado", hum: "45%", viento: "12 km/h" },
            { id: 10, nombre: "Chillán", region: "Ñuble", temp: 23, estado: "Despejado", hum: "40%", viento: "10 km/h" },
            { id: 11, nombre: "Concepción", region: "Biobío", temp: 16, estado: "Lluvia", hum: "85%", viento: "25 km/h" },
            { id: 12, nombre: "Temuco", region: "Araucanía", temp: 14, estado: "Lluvia", hum: "90%", viento: "18 km/h" },
            { id: 13, nombre: "Valdivia", region: "Los Ríos", temp: 12, estado: "Lluvia", hum: "95%", viento: "30 km/h" },
            { id: 14, nombre: "Puerto Montt", region: "Los Lagos", temp: 11, estado: "Nublado", hum: "88%", viento: "25 km/h" },
            { id: 15, nombre: "Punta Arenas", region: "Magallanes", temp: 5, estado: "Nieve", hum: "80%", viento: "40 km/h" }
        ];

        // 1. Obtener el ID de la URL
        const params = new URLSearchParams(window.location.search);
        const ciudadId = parseInt(params.get('id'));

        // 2. Buscar la ciudad
        const ciudad = ciudades.find(c => c.id === ciudadId);

        const visor = document.getElementById('pantalla-detalle');

        if (ciudad) {
            visor.innerHTML = `
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="card card-detalle p-4 p-md-5 bg-white mb-4">
                        <div class="text-center">
                            <h1 class="display-3 fw-bold text-primary">${ciudad.nombre}</h1>
                            <p class="h5 text-muted mb-4">${ciudad.region}</p>
                            <div class="display-1 mb-4">${ciudad.temp}°C</div>
                            <span class="badge bg-warning text-dark fs-5 px-4 mb-5">${ciudad.estado}</span>
                        </div>

                        <div class="row text-center mt-2 g-3">
                            <div class="col-6 col-md-3">
                                <div class="p-3 border rounded">
                                    <small class="text-muted d-block">Humedad</small>
                                    <span class="fw-bold">${ciudad.hum}</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 border rounded">
                                    <small class="text-muted d-block">Viento</small>
                                    <span class="fw-bold">${ciudad.viento}</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 border rounded">
                                    <small class="text-muted d-block">Presión</small>
                                    <span class="fw-bold">1015 hPa</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="p-3 border rounded">
                                    <small class="text-muted d-block">UV</small>
                                    <span class="fw-bold">Bajo</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h4 class="fw-bold mb-3">Pronóstico Próximos Días</h4>
                    <div class="row row-cols-2 row-cols-md-5 g-2">
                        <div class="col"><div class="pronostico-card">Lun<br><b>${ciudad.temp+1}°</b></div></div>
                        <div class="col"><div class="pronostico-card">Mar<br><b>${ciudad.temp+2}°</b></div></div>
                        <div class="col"><div class="pronostico-card">Mie<br><b>${ciudad.temp}°</b></div></div>
                        <div class="col"><div class="pronostico-card">Jue<br><b>${ciudad.temp-1}°</b></div></div>
                        <div class="col"><div class="pronostico-card">Vie<br><b>${ciudad.temp-2}°</b></div></div>
                    </div>
                </div>
            `;
        } else {
            visor.innerHTML = `
                <div class="col-12 text-center mt-5">
                    <div class="alert alert-danger shadow">
                        <h3>Ciudad no encontrada</h3>
                        <p>Por favor regresa al inicio y selecciona una ciudad de la lista.</p>
                        <a href="index.html" class="btn btn-danger mt-3">Volver al Home</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
