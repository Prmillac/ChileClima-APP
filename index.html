<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChileClima | Módulo 3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="weather-app">

    <header class="weather-app__header">
        <nav class="navbar navbar-dark bg-dark shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">🌤️ CHILECLIMA MVP</a>
            </div>
        </nav>
    </header>

    <main class="weather-app__content container">
        <section class="text-center my-5">
            <h1 class="display-4 fw-bold">Estado del Tiempo</h1>
            <p class="lead text-muted">Refactorización SASS + Metodología BEM</p>
        </section>

        <div class="row" id="contenedor-ciudades">
            </div>
    </main>

    <footer class="weather-app__footer text-center bg-dark text-white py-4 mt-auto">
        <div class="container">
            <p class="mb-0">Proyecto ChileClima - Módulo 3</p>
            <p class="small mb-0">Desarrollado por Priscilla Milla Carreño - 2026</p>
        </div>
    </footer>

    <script src="js/datos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('contenedor-ciudades');
            
            if (typeof ciudadesChile !== 'undefined') {
                ciudadesChile.forEach(c => {
                    
                    const esLluvia = c.estado.toLowerCase().includes('lluvia') || c.estado.toLowerCase().includes('nieve');
                    const modclima = esLluvia ? 'rainy' : 'sunny';
                    
                    grid.innerHTML += `
                        <div class="col-12 col-md-6 col-lg-4 mb-4">
                            <article class="place-card place-card--${modclima}" onclick="location.href='detalle.html?id=${c.id}'">
                                <h5 class="place-card__name">${c.nombre}</h5>
                                <div class="place-card__temp">${c.temp}°C</div>
                                <span class="place-card__status">${c.estado}</span>
                            </article>
                        </div>
                    `;
                });
            } else {
                console.error("No se encontró el archivo js/datos.js");
            }
        });
    </script>
</body>
</html>
