<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChileClima | Módulo 3</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="weather-app">

    <header class="weather-app__header">
        <nav class="navbar navbar-dark container">
            <a class="navbar-brand fw-bold" href="index.html">🌤️ CHILECLIMA</a>
        </nav>
    </header>

    <main class="weather-app__content container">
        <div class="text-center mb-5">
            <h1 class="font-weight-bold">Estado del Tiempo</h1>
            <p class="text-muted">Refactorización SASS + BEM</p>
        </div>

        <div class="row" id="contenedor-ciudades"></div>
    </main>

    <footer class="weather-app__footer text-center">
        <div class="container">
            <p class="mb-0">Proyecto ChileClima - Módulo 3</p>
            <small>Desarrollado por [Priscilla Milla Carreño] - 2026</small>
        </div>
    </footer>

    <script src="js/datos.js"></script>
    <script>
        const grid = document.getElementById('contenedor-ciudades');
        ciudadesChile.forEach(c => {
            const esLluvia = c.estado.toLowerCase().includes('lluvia');
            const mod = esLluvia ? 'rainy' : 'sunny';
            
            grid.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <article class="place-card" onclick="location.href='detalle.html?id=${c.id}'">
                        <h5 class="place-card__name">${c.nombre}</h5>
                        <div class="place-card__temp">${c.temp}°C</div>
                        <span class="place-card__status place-card__status--${mod}">
                            ${c.estado}
                        </span>
                    </article>
                </div>`;
        });
    </script>
</body>
</html>
