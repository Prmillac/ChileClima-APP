<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChileClima | Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="weather-app">

    <header class="weather-app__header">
        <nav class="navbar navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">🇨🇱 ChileClima</a>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <section class="search-zone text-center mb-5">
            <h1 class="display-4">Pronóstico en Chile</h1>
            <p class="lead">Busca y selecciona una localidad para ver detalles</p>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" placeholder="Buscar ciudad...">
                        <div class="input-group-append">
                            <button class="btn btn-primary" type="button">Buscar</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="results-zone">
            <div id="grid-ciudades" class="row">
                </div>
        </section>
    </main>

    <footer class="weather-app__footer bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-1"><strong>ChileClima MVP</strong> - Proyecto Módulo 3</p>
            <p class="mb-1">Autora: Priscilla Milla Carreño | 2026</p>
            <small>Desarrollado para Bootcamp Talento Digital</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
